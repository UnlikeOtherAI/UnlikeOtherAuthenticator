openapi: 3.0.3
info:
  title: UnlikeOtherAuthenticator API
  version: 1.0.0
  description: |
    Centralized OAuth / authentication service. Provides user auth flows,
    token issuance, organisation/team management, and admin operations.

    ## Authentication Schemes

    | Scheme | Header | Format | Used By |
    |--------|--------|--------|---------|
    | Domain Hash Bearer | `Authorization` | `Bearer SHA256(normalizedDomain+clientSecret)` | Domain-scoped server-to-server calls |
    | Admin Bearer | `Authorization` | `Bearer <HS256 JWT>` | Internal admin endpoints |
    | Access Token | `X-UOA-Access-Token` | `Bearer <JWT>` or raw JWT | User-context org endpoints |
    | Config JWT | `X-UOA-Config-JWT` | RS256 JWT | Email send endpoint |

    ## Config URL
    Most endpoints require a `config_url` query parameter pointing to a signed
    RS256 config JWT hosted by the integrator. The server fetches and verifies
    this JWT on every request.

servers:
  - url: https://auth.example.com
    description: Production

security: []

tags:
  - name: Infrastructure
    description: Health, JWKS, API schema, admin UI
  - name: Config
    description: Config JWT validation and verification
  - name: Auth
    description: Authentication flows (login, register, social, tokens)
  - name: 2FA
    description: Two-factor authentication
  - name: i18n
    description: Auth UI translations
  - name: Apps
    description: Mobile/web app startup payload
  - name: Email
    description: Transactional email sending
  - name: Integrations
    description: Integration claim flows
  - name: Domain
    description: Domain-scoped user and log queries
  - name: Organizations
    description: User-facing org, team, group, and membership management
  - name: Internal Admin
    description: System-admin–only management endpoints
  - name: Internal Org
    description: Server-to-server group and team-group management
  - name: Billing
    description: Signed tariff resolution, product-scoped Checkout, Stripe webhooks, and usage reconciliation

components:
  securitySchemes:
    domainHashBearer:
      type: http
      scheme: bearer
      description: |
        `Bearer SHA256(normalizedDomain + clientSecret)` — uses the per-domain client secret, not the shared secret.
    adminBearer:
      type: http
      scheme: bearer
      description: |
        HS256 JWT signed with `ADMIN_ACCESS_TOKEN_SECRET`. Claims must include
        `role: "superuser"` and `domain` matching `ADMIN_AUTH_DOMAIN`.
    accessToken:
      type: apiKey
      in: header
      name: X-UOA-Access-Token
      description: |
        UOA access token (HS256 JWT). May be prefixed with `Bearer ` or sent raw.
    configJwt:
      type: apiKey
      in: header
      name: X-UOA-Config-JWT
      description: RS256 config JWT signed with the domain's private key.
    billingAppKey:
      type: apiKey
      in: header
      name: X-UOA-App-Key
      description: One revocable UOA app key dedicated to the exact calling product/deployment and either entitlement or customer-lifecycle endpoints.
    billingActor:
      type: apiKey
      in: header
      name: X-UOA-Actor
      description: Short-lived RS256 actor assertion bound to the exact product app key and UOA user/org/team.
    stripeSignature:
      type: apiKey
      in: header
      name: Stripe-Signature
      description: Stripe endpoint signature verified over the exact raw request body with a separate webhook secret.

  parameters:
    configUrl:
      name: config_url
      in: query
      required: true
      description: HTTPS URL to a signed RS256 config JWT hosted by the integrator.
      schema:
        type: string
        format: uri

    domainQuery:
      name: domain
      in: query
      required: true
      description: Normalised domain (lowercase, trimmed).
      schema:
        type: string
        example: acme.example.com

    limitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200

    cursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: string

    orgIdPath:
      name: orgId
      in: path
      required: true
      schema:
        type: string

    teamIdPath:
      name: teamId
      in: path
      required: true
      schema:
        type: string

    groupIdPath:
      name: groupId
      in: path
      required: true
      schema:
        type: string

    userIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string

    domainPath:
      name: domain
      in: path
      required: true
      description: Normalised domain.
      schema:
        type: string
        example: acme.example.com

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Generic public error message.
        code:
          type: string
          description: Machine-readable error code (only when DEBUG_ENABLED).
        summary:
          type: string
        details:
          type: array
          items:
            type: string
        hints:
          type: array
          items:
            type: string

    BillingSubjectRequest:
      type: object
      additionalProperties: false
      required: [product, organisation_id, team_id, user_id]
      properties:
        product:
          type: string
          description: Exact service identifier bound to the app key.
        organisation_id:
          type: string
        team_id:
          type: string
        user_id:
          type: string

    BillingStripeSubscriptionSummary:
      type: object
      additionalProperties: false
      required:
        - product
        - subject
        - tariff
        - assignment
        - stripe_collection_enabled
        - stripe_mode
        - can_manage
        - subscription
      properties:
        product:
          type: object
          additionalProperties: true
        subject:
          type: object
          required: [user_id, organisation_id, team_id]
          properties:
            user_id:
              type: string
            organisation_id:
              type: string
            team_id:
              type: string
        tariff:
          type: object
          additionalProperties: true
        assignment:
          type: object
          additionalProperties: true
        stripe_collection_enabled:
          type: boolean
        stripe_mode:
          type: string
          nullable: true
          enum: [test, live]
        can_manage:
          type: boolean
        subscription:
          type: object
          nullable: true
          additionalProperties: false
          required:
            - id
            - status
            - scope
            - scope_key
            - tariff_id
            - cancel_at_period_end
            - current_period_start
            - current_period_end
            - billing_phase
            - created_at
            - synced_at
          properties:
            id:
              type: string
            status:
              type: string
            scope:
              type: string
              enum: [organisation, team]
            scope_key:
              type: string
            tariff_id:
              type: string
            cancel_at_period_end:
              type: boolean
            current_period_start:
              type: string
              format: date-time
              nullable: true
            current_period_end:
              type: string
              format: date-time
              nullable: true
            billing_phase:
              type: string
              enum: [calendar_month, free_alignment_period, unknown]
            created_at:
              type: string
              format: date-time
            synced_at:
              type: string
              format: date-time

    ExactMoney:
      type: object
      additionalProperties: false
      required: [amount, currency, display]
      properties:
        amount:
          type: string
          pattern: '^-?(0|[1-9][0-9]*)(\.[0-9]+)?$'
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        display:
          type: string

    BillingStatementV1:
      type: object
      additionalProperties: false
      description: |
        Display-ready canonical UOA customer statement. The exact authoritative
        Draft 2020-12 schema is published at
        `/schemas/billing-statement-v1.json`; products render this model and do
        not derive commercial fields.
      required:
        - schema_version
        - statement_id
        - generated_at
        - product
        - subject
        - period
        - pinned_inputs
        - plan
        - collection
        - subscription
        - services
        - usage
        - commercial_lines
        - totals
        - capabilities
        - actions
      properties:
        schema_version:
          type: integer
          enum: [1]
        statement_id:
          type: string
          pattern: '^bst_'
        generated_at:
          type: string
          format: date-time
        product:
          type: object
          additionalProperties: false
          required: [id, identifier, name]
          properties:
            id:
              type: string
            identifier:
              type: string
            name:
              type: string
        subject:
          type: object
          additionalProperties: false
          required: [user_id, organisation_id, team_id]
          properties:
            user_id:
              type: string
            organisation_id:
              type: string
            team_id:
              type: string
        period:
          type: object
          additionalProperties: false
          required: [key, starts_at, ends_at, state]
          properties:
            key:
              type: string
              pattern: '^\d{4}-(0[1-9]|1[0-2])$'
            starts_at:
              type: string
              format: date-time
            ends_at:
              type: string
              format: date-time
            state:
              type: string
              enum: [open, closed]
        pinned_inputs:
          type: object
          additionalProperties: false
          required: [ledger_snapshots, tariff]
          properties:
            ledger_snapshots:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: object
                additionalProperties: false
                required: [group_by, cursor, id, captured_at, sha256]
                properties:
                  group_by:
                    type: string
                    enum: [service, user]
                  cursor:
                    type: string
                    pattern: '^mus_'
                  id:
                    type: string
                    pattern: '^mus_'
                  captured_at:
                    type: string
                    format: date-time
                  sha256:
                    type: string
                    pattern: '^[a-f0-9]{64}$'
            tariff:
              type: object
              additionalProperties: false
              required: [id, version]
              properties:
                id:
                  type: string
                version:
                  type: integer
                  minimum: 1
        plan:
          type: object
          additionalProperties: true
          description: Exact immutable tariff, display labels, markup, monthly value, and assignment.
        collection:
          type: object
          additionalProperties: false
          required:
            - payment_collection_enabled
            - stripe_collection_enabled
            - stripe_mode
          properties:
            payment_collection_enabled:
              type: boolean
            stripe_collection_enabled:
              type: boolean
            stripe_mode:
              type: string
              nullable: true
              enum: [test, live]
        subscription:
          type: object
          nullable: true
          additionalProperties: true
          description: Safe Stripe-ID-free current subscription projection.
        services:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - product
              - name
              - display_name
              - access
              - direct_user_count
              - roles
            properties:
              product:
                type: string
              name:
                type: string
                nullable: true
              display_name:
                type: string
              access:
                type: string
                enum: [direct, indirect]
              direct_user_count:
                type: integer
                minimum: 0
              roles:
                type: array
                uniqueItems: true
                items:
                  type: string
                  enum: [billing_product, caller_product, origin_product]
        usage:
          type: object
          additionalProperties: false
          required: [lines, totals, cost_totals, user_totals]
          properties:
            lines:
              type: array
              items:
                type: object
                additionalProperties: true
                description: Exact raw/billable units, share, attribution, provider cost, and UOA-rated charge.
            totals:
              type: array
              items:
                type: object
                additionalProperties: true
            cost_totals:
              type: array
              items:
                type: object
                additionalProperties: true
            user_totals:
              type: array
              items:
                type: object
                additionalProperties: true
        commercial_lines:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [id, kind, product, label, detail, amount]
            properties:
              id:
                type: string
              kind:
                type: string
                enum: [monthly_subscription, usage, add_on, credit]
              product:
                type: string
              label:
                type: string
              detail:
                type: string
              amount:
                $ref: '#/components/schemas/ExactMoney'
        totals:
          type: array
          items:
            type: object
            additionalProperties: true
            description: Exact monthly, usage, add-on, credit, and total-due money for one currency.
        capabilities:
          type: object
          additionalProperties: false
          required: [can_upgrade, can_open_portal, can_cancel]
          properties:
            can_upgrade:
              type: boolean
            can_open_portal:
              type: boolean
            can_cancel:
              type: boolean
        actions:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - id
              - kind
              - label
              - description
              - enabled
              - disabled_reason
              - request
            properties:
              id:
                type: string
                enum: [upgrade, portal, cancel]
              kind:
                type: string
                enum: [hosted_redirect, confirmation_dialog]
              label:
                type: string
              description:
                type: string
              enabled:
                type: boolean
              disabled_reason:
                type: string
                nullable: true
              request:
                type: object
                additionalProperties: false
                required: [method, path, body]
                properties:
                  method:
                    type: string
                    enum: [POST]
                  path:
                    type: string
                  body:
                    type: object
                    additionalProperties:
                      type: string

    BillingCancellationPreviewV1:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - preview_token
        - expires_at
        - title
        - message
        - choice_required
        - choices
        - direct_services
        - indirect_services
        - confirm_action
      properties:
        schema_version:
          type: integer
          enum: [1]
        preview_token:
          type: string
          pattern: '^uoa_cancel_'
        expires_at:
          type: string
          format: date-time
        title:
          type: string
        message:
          type: string
        choice_required:
          type: boolean
        choices:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [id, label, description, service_ids]
            properties:
              id:
                type: string
                enum: [current_service, current_and_related_direct_services]
              label:
                type: string
              description:
                type: string
              service_ids:
                type: array
                items:
                  type: string
        direct_services:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - service_id
              - product
              - name
              - display_name
              - direct_user_count
              - subscription_status
            properties:
              service_id:
                type: string
              product:
                type: string
              name:
                type: string
              display_name:
                type: string
              direct_user_count:
                type: integer
                minimum: 0
              subscription_status:
                type: string
        indirect_services:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [product, name, display_name, impact]
            properties:
              product:
                type: string
              name:
                type: string
                nullable: true
              display_name:
                type: string
              impact:
                type: string
        confirm_action:
          type: object
          additionalProperties: false
          required:
            - method
            - path
            - label
            - idempotency_key
            - selection_required
            - default_selection
          properties:
            method:
              type: string
              enum: [POST]
            path:
              type: string
              enum: [/billing/v1/cancellation/confirm]
            label:
              type: string
            idempotency_key:
              type: string
              pattern: '^uoa_confirm_'
            selection_required:
              type: boolean
            default_selection:
              type: string
              nullable: true
              enum: [current_service]

    BillingCancellationConfirmationV1:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - status
        - title
        - message
        - cancelled_services
        - indirect_services
      properties:
        schema_version:
          type: integer
          enum: [1]
        status:
          type: string
          enum: [confirmed]
        title:
          type: string
        message:
          type: string
        cancelled_services:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - service_id
              - product
              - name
              - display_name
              - status
              - effective_at
            properties:
              service_id:
                type: string
              product:
                type: string
              name:
                type: string
              display_name:
                type: string
              status:
                type: string
              effective_at:
                type: string
                format: date-time
                nullable: true
        indirect_services:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [product, display_name, impact]
            properties:
              product:
                type: string
              display_name:
                type: string
              impact:
                type: string

    OkTrue:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    LoginSuccess:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          description: One-time authorization code (absent when 2FA required).
        redirect_to:
          type: string
          description: Present when authentication is complete (absent when twofa_required is true).
        twofa_required:
          type: boolean
          description: Present and `true` when 2FA is required before token exchange.
        twofa_token:
          type: string
          description: Short-lived challenge token to submit to `POST /2fa/verify`.
        access_request_status:
          type: string
          enum: [pending]
          description: Set when the user requires approval to access the domain.

    AuthCodeSuccess:
      type: object
      required: [ok, redirect_to]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
        redirect_to:
          type: string
        access_request_status:
          type: string
          enum: [pending]

    TokenResponse:
      type: object
      required: [access_token, expires_in, refresh_token, refresh_token_expires_in, token_type]
      properties:
        access_token:
          type: string
          description: 'HS256 JWT, aud claim is "uoa:access-token".'
        expires_in:
          type: integer
          description: Seconds until access token expiry.
        refresh_token:
          type: string
        refresh_token_expires_in:
          type: integer
          description: Seconds until refresh token expiry.
        token_type:
          type: string
          enum: [Bearer]
        firstLogin:
          type: object
          description: Present only on first-ever login for this user on this domain.
          properties:
            memberships:
              type: object
              properties:
                orgs:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                teams:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
            pending_invites:
              type: array
              items:
                type: object
                additionalProperties: true
            capabilities:
              type: object
              properties:
                can_create_org:
                  type: boolean
                can_accept_invite:
                  type: boolean

    ConfidentialTokenExchangeResponse:
      type: object
      required: [access_token, issued_token_type, token_type, expires_in, scope]
      additionalProperties: false
      properties:
        access_token:
          type: string
          description: |
            Five-minute RS256 JWT bound to the requested resource. Verify with
            GET /oauth/jwks.json and enforce iss + aud + exp. The JWT also
            carries the mapped product and exact requested scope subset.
        issued_token_type:
          type: string
          enum: ['urn:ietf:params:oauth:token-type:access_token']
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          enum: [300]
        scope:
          type: string
          description: Exact granted subset of ai.invoke, billing.read, and/or separately authorized token.provision.

    ConfidentialDelegationMapping:
      type: object
      required:
        - id
        - source_domain
        - product
        - resource
        - scopes
        - enabled
        - created_at
        - updated_at
      additionalProperties: false
      properties:
        id:
          type: string
        source_domain:
          type: string
        product:
          type: string
          pattern: '^[a-z0-9][a-z0-9._-]{0,99}$'
        resource:
          type: string
          format: uri
        scopes:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            enum: [ai.invoke, billing.read, token.provision]
        enabled:
          type: boolean
        created_by_email:
          type: string
          nullable: true
        updated_by_email:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AdminTokenResponse:
      type: object
      required: [access_token, expires_in, token_type]
      additionalProperties: false
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          enum: [Bearer]

    JwksResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            description: Public RSA JWK.
            additionalProperties: true

    PaginatedList:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        next_cursor:
          type: string
          nullable: true

    DomainObject:
      type: object
      additionalProperties: true

    OrganisationObject:
      type: object
      additionalProperties: true

    TeamObject:
      type: object
      additionalProperties: true

    MemberObject:
      type: object
      additionalProperties: true

    GroupObject:
      type: object
      additionalProperties: true

    InviteResult:
      type: string
      enum: [invited, resent_existing, already_member, conflict]

    AccessRequestObject:
      type: object
      additionalProperties: true

    IntegrationRequestObject:
      type: object
      additionalProperties: true

    RotateSecretResponse:
      type: object
      required: [domain, contact_email, delivery_mode, email_dispatched, hash_prefix]
      additionalProperties: false
      properties:
        domain:
          type: string
        contact_email:
          type: string
        delivery_mode:
          type: string
          enum: [email, reveal]
        email_dispatched:
          type: boolean
        hash_prefix:
          type: string
        credentials:
          type: object
          description: Present when `delivery_mode` is `reveal`.
          additionalProperties: false
          required: [domain, client_secret, client_hash, hash_prefix]
          properties:
            domain:
              type: string
            client_secret:
              type: string
            client_hash:
              type: string
            hash_prefix:
              type: string

    ConfigValidateResponse:
      type: object
      properties:
        ok:
          type: boolean
        schema_valid:
          type: boolean
        jwt_signature_valid:
          type: boolean
          nullable: true
        domain_match:
          type: boolean
          nullable: true
        checks:
          type: object
          additionalProperties: true
        issues:
          type: array
          items:
            type: object
            properties:
              stage:
                type: string
              code:
                type: string
              summary:
                type: string
              details:
                type: string
        recommendations:
          type: array
          items:
            type: string

    AppStartupResponse:
      type: object
      required: [flags, cacheTtl, serverTime]
      properties:
        killSwitch:
          type: object
          nullable: true
          additionalProperties: true
        flags:
          type: object
          additionalProperties:
            type: boolean
        cacheTtl:
          type: integer
        serverTime:
          type: string
          format: date-time
        activatesIn:
          type: integer
          description: Seconds until kill-switch activates (when scheduled).

    DomainMappingResponse:
      type: object
      additionalProperties: true
      description: Email-domain-to-org/team mapping result.

    DomainUsersResponse:
      type: object
      required: [ok, users]
      properties:
        ok:
          type: boolean
          enum: [true]
        users:
          type: array
          items:
            type: object
            required: [id, email]
            properties:
              id:
                type: string
              email:
                type: string
              name:
                type: string
                nullable: true
              avatar_url:
                type: string
                nullable: true
              twofa_enabled:
                type: boolean
              role:
                type: string
              created_at:
                type: string
                format: date-time

    DomainLogsResponse:
      type: object
      required: [ok, logs]
      properties:
        ok:
          type: boolean
          enum: [true]
        logs:
          type: array
          items:
            type: object
            required: [id, domain]
            properties:
              id:
                type: string
              user_id:
                type: string
                nullable: true
              email:
                type: string
                nullable: true
              domain:
                type: string
              timestamp:
                type: string
                format: date-time
              auth_method:
                type: string
              ip:
                type: string
                nullable: true
              user_agent:
                type: string
                nullable: true

    DomainDebugResponse:
      type: object
      required: [ok, domain, client_id, superuser]
      properties:
        ok:
          type: boolean
          enum: [true]
        domain:
          type: string
        client_id:
          type: string
        superuser:
          type: object
          required: [user_id, email]
          properties:
            user_id:
              type: string
            email:
              type: string

    AdminSessionResponse:
      type: object
      required: [ok, adminUser]
      additionalProperties: false
      properties:
        ok:
          type: boolean
        adminUser:
          type: object
          additionalProperties: true

    AdminDashboardResponse:
      type: object
      required: [stats, domains, organisations, users, logs, handshakeErrors, bans, apps]
      additionalProperties: false
      properties:
        stats:
          type: object
          additionalProperties: true
        domains:
          type: array
          items:
            type: object
            additionalProperties: true
        organisations:
          type: array
          items:
            type: object
            additionalProperties: true
        users:
          type: array
          items:
            type: object
            additionalProperties: true
        logs:
          type: array
          items:
            type: object
            additionalProperties: true
        handshakeErrors:
          type: array
          items:
            type: object
            additionalProperties: true
        bans:
          type: object
          additionalProperties: true
        apps:
          type: array
          items:
            type: object
            additionalProperties: true

    AdminSettingsResponse:
      type: object
      required: [bans, apps]
      additionalProperties: false
      properties:
        bans:
          type: object
          additionalProperties: true
        apps:
          type: array
          items:
            type: object
            additionalProperties: true

    RegisterDomainResponse:
      type: object
      required: [domain]
      additionalProperties: false
      properties:
        domain:
          type: object
          additionalProperties: true
        client_secret:
          type: string
          description: Only present when a new secret was generated.
        client_hash:
          type: string
        client_hash_prefix:
          type: string

paths:
  # ── Infrastructure ────────────────────────────────────────────────────────────

  /:
    get:
      tags: [Infrastructure]
      summary: Holding page
      operationId: holdingPage
      description: Returns a public HTML page linking to /admin, /llm, and /api.
      responses:
        '200':
          description: HTML holding page.
          content:
            text/html:
              schema:
                type: string

  /health:
    get:
      tags: [Infrastructure]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'

  /.well-known/jwks.json:
    get:
      tags: [Infrastructure]
      summary: Public JWKS
      operationId: getJwks
      description: Returns the public RSA key set used to verify config JWTs.
      responses:
        '200':
          description: JWKS document.
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'

  /api:
    get:
      tags: [Infrastructure]
      summary: Machine-readable API schema
      operationId: getApiSchema
      description: Returns the full endpoint schema as a JSON object.
      responses:
        '200':
          description: Endpoint schema array.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: API info and full endpoint schema.

  /llm:
    get:
      tags: [Infrastructure]
      summary: LLM / human integration guide
      operationId: getLlmGuide
      description: Returns Markdown documentation for LLMs and integrators. Links /api for the JSON schema.
      responses:
        '200':
          description: Markdown integration guide.
          content:
            text/markdown:
              schema:
                type: string

  /admin:
    get:
      tags: [Infrastructure]
      summary: Admin redirect
      operationId: adminRedirect
      description: Redirects to /admin/.
      responses:
        '302':
          description: Redirect to /admin/.

  /admin/{path}:
    get:
      tags: [Infrastructure]
      summary: Admin UI (CSR shell and static assets)
      operationId: getAdminUi
      description: |
        Serves the single-page React admin application. All paths under `/admin/`
        return either the HTML shell or a static asset. `/admin` (no trailing slash)
        redirects to `/admin/`.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HTML shell or static asset.
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Redirect from `/admin` to `/admin/`.

  /admin/assets/{path}:
    get:
      tags: [Infrastructure]
      summary: Admin UI static assets
      operationId: getAdminAsset
      description: Serves built Admin app JS/CSS/font assets. Cached for 1 year (immutable).
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset file with appropriate Content-Type.
        '404':
          description: Asset not found.

  /assets/{path}:
    get:
      tags: [Infrastructure]
      summary: Auth UI static assets
      operationId: getAsset
      description: |
        Serves the built Auth application's JS, CSS, and font assets referenced by
        the auth entrypoint HTML. No authentication required.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Relative asset path (e.g. `index-abc123.js`).
      responses:
        '200':
          description: Asset file with appropriate `Content-Type`.
        '404':
          description: Asset not found.

  # ── Config ────────────────────────────────────────────────────────────────────

  /config/validate:
    post:
      tags: [Config]
      summary: Validate a config JWT
      operationId: validateConfig
      description: |
        Validates a config JWT without making database calls. Runs schema checks,
        signature verification, domain matching, and secret scanning. Rate limited
        to 20 requests per minute per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one of `config`, `config_jwt`, or `config_url` is required.
              properties:
                config:
                  type: object
                  description: Raw decoded config object.
                  additionalProperties: true
                config_jwt:
                  type: string
                  description: Signed RS256 config JWT string.
                config_url:
                  type: string
                  format: uri
                  description: URL from which to fetch the signed config JWT.
      responses:
        '200':
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidateResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /config/verify:
    post:
      tags: [Config]
      summary: Verify a config JWT (debug only)
      operationId: verifyConfig
      description: |
        Like `/config/validate` but skips secret scanning and runtime policy checks.
        Only available when `DEBUG_ENABLED=true` and `NODE_ENV` is not `production`.
        Rate limited to 10 requests per minute per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                  additionalProperties: true
                config_jwt:
                  type: string
                config_url:
                  type: string
                  format: uri
                jwks_url:
                  type: string
                  format: uri
                  description: Defaults to `CONFIG_JWKS_URL` env var.
      responses:
        '200':
          description: Verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidateResponse'
        '404':
          description: Not available (DEBUG_ENABLED not set or production environment).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Auth ──────────────────────────────────────────────────────────────────────

  /auth:
    get:
      tags: [Auth]
      summary: OAuth entrypoint (renders Auth UI)
      operationId: getAuthEntrypoint
      description: |
        Returns the HTML shell for the embedded auth UI. Requires a valid
        `config_url`. Rate limited to 60 requests per minute per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Auth UI HTML.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Email / password login
      operationId: login
      description: |
        Authenticates a user with email and password. Returns an authorization
        code on success, or a `twofa_token` when 2FA is required.
        Rate limited: 10/min per IP, 5/15 min per email.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 1
                remember_me:
                  type: boolean
      responses:
        '200':
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccess'
        '400':
          description: Validation error or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register / initiate email login link
      operationId: register
      description: |
        Sends a magic-link email for registration or passwordless login.
        Always returns 200 to avoid email enumeration.
        Rate limited: 10/min per IP, 5/hour per email.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returned (no enumeration).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: We sent instructions to your email
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Complete email verification
      operationId: verifyEmail
      description: |
        Consumes an email verification token. Optionally sets a password for
        new accounts that haven't set one. Returns an authorization code.
        Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              additionalProperties: false
              properties:
                token:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
                  description: Required when completing a registration that sets a password.
      responses:
        '200':
          description: Email verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCodeSuccess'
        '400':
          description: Missing config, missing password, or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/token:
    post:
      tags: [Auth]
      summary: Token exchange (authorization code, refresh token, or confidential subject token)
      operationId: exchangeToken
      description: |
        Exchanges an authorization code or refresh token for the legacy access-token
        pair. A confidential backend may instead use the RFC 8693 token-exchange grant
        with its own per-domain app credential plus either a short-lived source-signed
        JWT assertion or an already UOA-issued access token whose audience is exactly
        that authenticated next-hop app. An enabled DB mapping
        must bind the authenticated ClientDomain and requested product to the exact
        resource and requested scope allowlist; there is no shared credential or
        singleton source/resource env fallback. Both subject profiles re-resolve the
        current user, original source-domain role, and requested ACTIVE org/team
        membership before issue. First-hop assertions are atomically consumed once.
        Chained access-token subjects are reusable until exp, but scope is narrowed by
        both mappings and the result never outlives the inbound token.
        Requires domain hash bearer authentication.
        Legacy grants are rate limited at 10/min per IP. Confidential exchange is
        isolated from that shared-egress bucket and limited at 600/min per
        authenticated source domain plus 60/min per verified source-domain user.
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Authorization Code Grant
                  type: object
                  required: [code, redirect_url]
                  additionalProperties: false
                  properties:
                    grant_type:
                      type: string
                      enum: [authorization_code]
                      default: authorization_code
                    code:
                      type: string
                      minLength: 1
                    redirect_url:
                      type: string
                      minLength: 1
                    code_verifier:
                      type: string
                      minLength: 1
                      description: PKCE code verifier (required when `code_challenge` was supplied).
                - title: Refresh Token Grant
                  type: object
                  required: [grant_type, refresh_token]
                  additionalProperties: false
                  properties:
                    grant_type:
                      type: string
                      enum: [refresh_token]
                    refresh_token:
                      type: string
                      minLength: 1
                - title: Confidential Token Exchange
                  type: object
                  required:
                    [grant_type, subject_token, subject_token_type, product, resource, scope]
                  additionalProperties: false
                  properties:
                    grant_type:
                      type: string
                      enum: ['urn:ietf:params:oauth:grant-type:token-exchange']
                    subject_token:
                      type: string
                      minLength: 1
                      maxLength: 16384
                      description: |
                        With subject_token_type=jwt: an RS256 JWT signed by a kid in
                        the source config's same-host jwks_url, with exact source
                        issuer/audience, stable sub, fresh jti, iat/exp <= 60 seconds,
                        and optional exact {orgId, teamId}; accepted once.
                        With subject_token_type=access_token: a UOA RS256 at+jwt whose
                        aud is exactly https://<authenticated caller config domain>,
                        with consistent non-null org/active provenance. It is reusable
                        until exp; the downstream result is scope- and expiry-capped.
                    subject_token_type:
                      type: string
                      enum:
                        - 'urn:ietf:params:oauth:token-type:jwt'
                        - 'urn:ietf:params:oauth:token-type:access_token'
                    product:
                      type: string
                      minLength: 1
                      maxLength: 100
                      pattern: '^[a-z0-9][a-z0-9._-]{0,99}$'
                      description: |
                        Product selected within the mapping bound to the
                        authenticated per-domain app credential.
                    resource:
                      type: string
                      maxLength: 2048
                      description: |
                        Exact HTTPS resource in the DB-backed product mapping.
                        This value becomes the issued access token's aud.
                    scope:
                      type: string
                      minLength: 1
                      maxLength: 256
                      description: |
                        Space-delimited exact requested subset of ai.invoke,
                        billing.read, and/or token.provision. Token provisioning
                        is never implied by ai.invoke. Unsupported, duplicate,
                        or widening scopes are rejected.
      responses:
        '200':
          description: Legacy token pair or confidential resource access token issued.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TokenResponse'
                  - $ref: '#/components/schemas/ConfidentialTokenExchangeResponse'
        '400':
          description: Invalid request or token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Confidential grant mapping, target, requested scopes, source-domain
            role, or optional workspace membership is not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/revoke:
    post:
      tags: [Auth]
      summary: Revoke refresh token (logout)
      operationId: revokeToken
      description: |
        Invalidates a refresh token. Requires domain hash bearer authentication.
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              additionalProperties: false
              properties:
                refresh_token:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Token revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'
        '400':
          description: Missing config or invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password/request:
    post:
      tags: [Auth]
      summary: Request password reset email
      operationId: requestPasswordReset
      description: |
        Sends a password reset email. Always returns 200 to avoid enumeration.
        Rate limited: 10/min per IP, 3/hour per email.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "If you have an account with us, we've sent you instructions"
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete password reset
      operationId: resetPassword
      description: |
        Consumes a password-reset token and sets a new password.
        Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              additionalProperties: false
              properties:
                token:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Password reset successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'
        '400':
          description: Invalid token or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/social/{provider}:
    get:
      tags: [Auth]
      summary: Initiate social OAuth flow
      operationId: initiateSocialAuth
      description: |
        Redirects to the social provider's authorization URL. State is stored
        server-side (session cookie). Rate limited: 60/min per IP.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, apple, facebook, github, linkedin]
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: redirect_uri
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to social provider.
        '400':
          description: Missing config or unsupported provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Social provider environment variable missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/callback/{provider}:
    get:
      tags: [Auth]
      summary: Social OAuth callback
      operationId: socialAuthCallback
      description: |
        Handles the OAuth provider redirect. Validates state, exchanges code,
        upserts user, then redirects to the auth UI with a code or `twofa_token`.
        Rate limited: 20/min per IP.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, apple, facebook, github, linkedin]
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
            description: Error code returned by the social provider.
      responses:
        '302':
          description: Redirect to /auth with code or twofa_token, or to error page.
        '400':
          description: Missing callback params or provider mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Social provider returned an error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/domain-mapping:
    get:
      tags: [Auth]
      summary: Email-domain to org/team mapping lookup
      operationId: getDomainMapping
      description: |
        Returns org/team mapping rules for a given email domain. Used by the auth
        UI to auto-suggest or auto-join an org. Requires a valid `config_url`.
        Rate limited: 60/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: email_domain
          in: query
          required: true
          schema:
            type: string
            description: Email domain to look up (e.g. `acme.com`).
      responses:
        '200':
          description: Mapping result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainMappingResponse'
        '401':
          description: Missing config or domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/email/link:
    get:
      tags: [Auth]
      summary: Email magic-link landing page
      operationId: handleEmailLink
      description: |
        Handles click-through from a magic-link email. Validates the token, then
        either redirects (LOGIN_LINK) or renders a set-password form
        (VERIFY_EMAIL_SET_PASSWORD). Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to auth UI with authorization code.
        '200':
          description: HTML set-password form.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing config or invalid token.

  /auth/email/reset-password:
    get:
      tags: [Auth]
      summary: Password-reset email landing page
      operationId: handlePasswordResetEmail
      description: |
        Handles click-through from a password-reset email. Renders the
        set-new-password form. Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: redirect_url
          in: query
          schema:
            type: string
      responses:
        '200':
          description: HTML set-password form.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing config or invalid token.

  /auth/email/twofa-reset:
    get:
      tags: [Auth]
      summary: 2FA-reset email landing page
      operationId: handleTwofaResetEmail
      description: 'Renders the 2FA reset confirmation page. Rate limited: 10/min per IP.'
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HTML confirmation page.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing config or invalid token.

  /auth/email/twofa-reset/confirm:
    post:
      tags: [Auth]
      summary: Confirm 2FA reset via email link
      operationId: confirmTwofaReset
      description: 'Consumes the 2FA reset token. Rate limited: 10/min per IP.'
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 2FA reset confirmed (HTML response).
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing config or invalid token.

  /auth/email/team-invite:
    get:
      tags: [Auth]
      summary: Team invite email landing page
      operationId: handleTeamInviteEmail
      description: |
        Shows accept/decline UI for a team invitation. Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: redirect_url
          in: query
          schema:
            type: string
      responses:
        '200':
          description: HTML invite page.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid or expired invite.
          content:
            text/html:
              schema:
                type: string

  /auth/email/team-invite/decline:
    get:
      tags: [Auth]
      summary: Decline team invite via email link
      operationId: declineTeamInvite
      description: 'Marks the team invite as declined. Rate limited: 10/min per IP.'
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: redirect_url
          in: query
          schema:
            type: string
      responses:
        '200':
          description: HTML decline confirmation.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid or expired invite.

  /auth/email/team-invite-open/{inviteId}.gif:
    get:
      tags: [Auth]
      summary: Email open tracking pixel
      operationId: trackInviteEmailOpen
      description: |
        1×1 GIF tracking pixel. Records that the invite email was opened.
        No authentication required.
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 1×1 transparent GIF.
          content:
            image/gif:
              schema:
                type: string
                format: binary

  # ── 2FA ───────────────────────────────────────────────────────────────────────

  /2fa/verify:
    post:
      tags: [2FA]
      summary: Verify TOTP code
      operationId: verifyTotp
      description: |
        Validates a TOTP code against a pending `twofa_token`. Returns an
        authorization code on success. Rate limited: 5/15 min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [twofa_token, code]
              additionalProperties: false
              properties:
                twofa_token:
                  type: string
                  minLength: 1
                  description: Token returned by `POST /auth/login` when `twofa_required` is true.
                code:
                  type: string
                  minLength: 1
                  description: 6-digit TOTP code from the authenticator app.
      responses:
        '200':
          description: TOTP verified. Authorization code returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCodeSuccess'
        '400':
          description: Missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid TOTP code or challenge mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /2fa/reset/request:
    post:
      tags: [2FA]
      summary: Request 2FA reset email
      operationId: requestTwofaReset
      description: |
        Sends a 2FA reset email. Always returns 200 to avoid enumeration.
        Rate limited: 10/min per IP, 3/hour per email.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: We sent instructions to your email
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /2fa/reset:
    post:
      tags: [2FA]
      summary: Complete 2FA reset
      operationId: resetTwofa
      description: |
        Consumes a 2FA reset token, disabling 2FA for the user.
        Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              additionalProperties: false
              properties:
                token:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: 2FA disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'
        '400':
          description: Invalid token or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── i18n ──────────────────────────────────────────────────────────────────────

  /i18n/{language}:
    get:
      tags: [i18n]
      summary: Get Auth UI translations
      operationId: getTranslations
      description: |
        Returns a flat key/value translation map for the requested language.
        The language must appear in the config's `language_config` field.
        Translations are AI-generated and cached permanently.
        Rate limited: 60/min per IP.
      parameters:
        - name: language
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 32
            example: en
        - $ref: '#/components/parameters/configUrl'
      responses:
        '200':
          description: Translation map.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '400':
          description: Language not allowed by config or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Apps ──────────────────────────────────────────────────────────────────────

  /apps/startup:
    get:
      tags: [Apps]
      summary: App startup payload (feature flags + kill switch)
      operationId: getAppStartup
      description: |
        Returns feature flags and kill-switch state for a mobile or web app.
        Requires a valid `config_url`.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: appIdentifier
          in: query
          required: true
          description: Bundle/package identifier (e.g. `com.acme.ios`).
          schema:
            type: string
        - name: platform
          in: query
          required: true
          schema:
            type: string
            enum: [ios, android, web, macos, windows, other]
        - name: versionName
          in: query
          schema:
            type: string
            description: Semantic or display version string.
        - name: versionCode
          in: query
          schema:
            type: string
            description: Android numeric version code.
        - name: buildNumber
          in: query
          schema:
            type: string
            description: iOS / macOS build number.
        - name: userId
          in: query
          schema:
            type: string
            description: Per-user flag overrides and kill-switch targeting.
        - name: teamId
          in: query
          schema:
            type: string
            description: Reserved for multi-team flag resolution.
      responses:
        '200':
          description: Startup payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStartupResponse'
        '400':
          description: Missing or invalid config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Email ─────────────────────────────────────────────────────────────────────

  /email/send:
    post:
      tags: [Email]
      summary: Send a transactional email
      operationId: sendEmail
      description: |
        Sends an email via the domain's configured SES mailing identity.
        Requires a valid RS256 config JWT in the `X-UOA-Config-JWT` header.
        Returns 202 on success (delivery is async).
      security:
        - configJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, text]
              additionalProperties: false
              properties:
                to:
                  type: string
                  format: email
                subject:
                  type: string
                  minLength: 1
                  maxLength: 998
                text:
                  type: string
                  minLength: 1
                  description: Plain-text body.
                html:
                  type: string
                  minLength: 1
                  description: HTML body (optional).
                reply_to:
                  type: string
                  format: email
      responses:
        '202':
          description: Email queued for delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'
        '401':
          description: Missing or invalid config JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Integrations ──────────────────────────────────────────────────────────────

  /integrations/claim/{token}:
    get:
      tags: [Integrations]
      summary: Integration claim confirm page
      operationId: getClaimPage
      description: |
        Shows an HTML confirmation page for a one-time claim token. Does NOT
        consume the token (safe for link scanners). Returns 404 HTML if the token
        is unknown, expired, or already used.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 512
      responses:
        '200':
          description: HTML confirmation page with a POST form.
          content:
            text/html:
              schema:
                type: string
        '404':
          description: Token not found or already consumed (HTML error page).
          content:
            text/html:
              schema:
                type: string

  /integrations/claim/{token}/confirm:
    post:
      tags: [Integrations]
      summary: Consume integration claim token
      operationId: confirmClaim
      description: |
        Consumes the claim token and reveals the integration credentials once.
        Returns an HTML page showing `domain`, `client_secret`, `client_hash`,
        `hash_prefix`, and the LLM URL. Returns 404 HTML on any failure.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 512
      responses:
        '200':
          description: HTML credential reveal page (shown exactly once).
          content:
            text/html:
              schema:
                type: string
        '404':
          description: Token not found, expired, or already consumed (HTML error page).
          content:
            text/html:
              schema:
                type: string

  # ── Domain ────────────────────────────────────────────────────────────────────

  /domain/users:
    get:
      tags: [Domain]
      summary: List domain users
      operationId: getDomainUsers
      description: |
        Returns all users registered under the domain.
        Requires domain hash bearer authentication.
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/limitQuery'
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainUsersResponse'
        '401':
          description: Missing or invalid domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /domain/logs:
    get:
      tags: [Domain]
      summary: List domain login logs
      operationId: getDomainLogs
      description: |
        Returns recent login activity for the domain.
        Requires domain hash bearer authentication.
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/limitQuery'
      responses:
        '200':
          description: Login log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainLogsResponse'
        '401':
          description: Missing or invalid domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /domain/debug:
    get:
      tags: [Domain]
      summary: Domain debug info (superuser only)
      operationId: getDomainDebug
      description: |
        Returns domain identity and superuser info. Requires both domain hash
        bearer auth AND a superuser access token (`X-UOA-Access-Token`).
      security:
        - domainHashBearer: []
          accessToken: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
      responses:
        '200':
          description: Debug payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainDebugResponse'
        '401':
          description: Missing domain hash auth or access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access token does not have superuser role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Organizations (user-facing) ───────────────────────────────────────────────

  /org/me:
    get:
      tags: [Organizations]
      summary: Current user org context
      operationId: getMyOrgContext
      description: |
        Returns the authenticated user's organisation memberships and capabilities
        within the domain. Requires domain hash auth AND a user access token.
      security:
        - domainHashBearer: []
          accessToken: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/configUrl'
      responses:
        '200':
          description: User org context.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  org:
                    type: object
                    additionalProperties: true
                    description: Present when the user has org context on this domain.
        '401':
          description: Missing access token or config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access token domain mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /org/organisations:
    get:
      tags: [Organizations]
      summary: List organisations
      operationId: listOrgs
      description: |
        Returns organisations visible to the domain. Paginated.
        Requires domain hash bearer auth.
      security:
        - domainHashBearer: []
          accessToken: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/configUrl'
        - $ref: '#/components/parameters/limitQuery'
        - $ref: '#/components/parameters/cursorQuery'
      responses:
        '200':
          description: Paginated organisation list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedList'
        '401':
          description: Missing auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Organizations]
      summary: Create organisation
      operationId: createOrg
      description: |
        Creates a new organisation. The authenticated user becomes the owner.
        Rate limited: 5/hour per domain+actor. Requires domain hash auth and
        either superuser role or `allow_user_create_org` config flag.
      security:
        - domainHashBearer: []
          accessToken: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              additionalProperties: false
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
      responses:
        '200':
          description: Organisation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganisationObject'
        '401':
          description: Missing config or auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Org creation not allowed for this user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /billing/v1/jwks.json:
    get:
      tags: [Billing]
      summary: Get tariff-snapshot verification keys
      operationId: getBillingTariffJwks
      security: []
      responses:
        '200':
          description: Current and overlapping retired public RS256 keys.
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '404':
          description: Tariff snapshot signing is not configured.

  /billing/v1/service-jwks.json:
    get:
      tags: [Billing]
      summary: Get UOA Ledger raw-metering assertion verification keys
      operationId: getBillingServiceJwks
      description: |
        Dedicated current and overlapping retired public RS256 keys for
        UOA-to-Ledger `metering.read` service assertions. These are separate from
        tariff, OAuth resource-token, app-key, and webhook credentials.
      security: []
      responses:
        '200':
          description: Public service-assertion JWKS.
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '404':
          description: Billing service-assertion signing is not configured.

  /schemas/billing-statement-v1.json:
    get:
      tags: [Billing]
      summary: Get the canonical customer billing statement schema
      operationId: getBillingStatementV1Schema
      security: []
      responses:
        '200':
          description: Authoritative Draft 2020-12 BillingStatementV1 schema.
          headers:
            Cache-Control:
              schema:
                type: string
                enum: ['public, max-age=300']
          content:
            application/schema+json:
              schema:
                type: object
                additionalProperties: true

  /billing/v1/effective-tariff:
    post:
      tags: [Billing]
      summary: Resolve and sign the effective immutable tariff
      operationId: resolveEffectiveBillingTariff
      security:
        - billingAppKey: []
          billingActor: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [product, organisation_id, team_id, user_id]
              properties:
                product:
                  type: string
                organisation_id:
                  type: string
                team_id:
                  type: string
                user_id:
                  type: string
      responses:
        '200':
          description: Content-free tariff payload plus its RS256 snapshot JWT.
          content:
            application/json:
              schema:
                type: object
                required: [snapshot, payload]
                properties:
                  snapshot:
                    type: string
                  payload:
                    type: object
                    additionalProperties: true
        '401':
          description: Invalid app key or actor assertion.
        '403':
          description: Product, subject, or active membership mismatch.

  /billing/v1/customer-statement:
    post:
      tags: [Billing]
      summary: Get the display-ready canonical customer statement
      operationId: getCanonicalBillingCustomerStatement
      description: |
        UOA is the commercial system of record. It pins the exact tariff and
        immutable Ledger service/user raw-metering snapshots, rates usage
        centrally, and returns all display text, exact money, per-user and
        cross-service attribution, commercial lines, capabilities, and action
        descriptors. Products must not derive commercial fields. The product
        backend injects its own lifecycle key and actor; browsers receive
        neither.
      security:
        - billingAppKey: []
          billingActor: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [product, organisation_id, team_id, user_id]
              properties:
                product:
                  type: string
                organisation_id:
                  type: string
                team_id:
                  type: string
                user_id:
                  type: string
                billing_month:
                  type: string
                  pattern: '^\d{4}-(0[1-9]|1[0-2])$'
      responses:
        '200':
          description: Display-ready UOA BillingStatementV1.
          headers:
            Cache-Control:
              schema:
                type: string
                enum: ['private, no-store']
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingStatementV1'
        '401':
          description: Invalid lifecycle app key or actor assertion.
        '403':
          description: Product, subject, manager, or active membership mismatch.
        '502':
          description: Ledger returned unavailable or invalid raw metering.
        '503':
          description: The dedicated Ledger metering reader is unconfigured.

  /billing/v1/service-access/confirm:
    post:
      tags: [Billing]
      summary: Confirm one authenticated direct product session
      operationId: confirmDirectBillingServiceAccess
      description: |
        A product backend must call this immediately after its own successful
        UOA SSO exchange or session establishment. The product's exact
        purpose=customer_lifecycle app key and fresh actor assertion prove the
        direct product boundary; UOA rechecks active organisation and team
        membership before recording evidence. Proxy or agent use of another
        product is indirect and must never call this route for that other
        product. No credential or call is exposed to browser code.
      security:
        - billingAppKey: []
          billingActor: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingSubjectRequest'
      responses:
        '204':
          description: Direct access confirmed for the exact product and subject.
          headers:
            Cache-Control:
              schema:
                type: string
                enum: ['private, no-store']
        '401':
          description: Invalid lifecycle app key or actor assertion.
        '403':
          description: Key purpose, product, subject, or active membership mismatch.

  /billing/v1/stripe/checkout-session:
    post:
      tags: [Billing]
      summary: Create a product-scoped Stripe subscription Checkout
      operationId: createBillingStripeCheckoutSession
      description: |
        Uses the calling product/deployment's purpose=customer_lifecycle UOA app
        key and a fresh actor assertion. Only an active owner/admin at the
        resulting organisation or team billing scope may create Checkout. The
        recoverable scope lease pins the exact Stripe account/mode, immutable
        tariff source/assignment, and return URLs. Organisation subscriptions
        exclude team subscriptions for the same product and organisation;
        independent team scopes may coexist. The cycle anchor is the next UTC
        month boundary with no proration, making the partial alignment period
        free. Stripe billing is disabled by default.
      security:
        - billingAppKey: []
          billingActor: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [product, organisation_id, team_id, user_id, success_url, cancel_url]
              properties:
                product:
                  type: string
                organisation_id:
                  type: string
                team_id:
                  type: string
                user_id:
                  type: string
                success_url:
                  type: string
                  format: uri
                cancel_url:
                  type: string
                  format: uri
      responses:
        '201':
          description: Stripe-hosted Checkout URL and exact immutable tariff.
          content:
            application/json:
              schema:
                type: object
                required: [checkout_session_id, checkout_url, expires_at, tariff]
                properties:
                  checkout_session_id:
                    type: string
                  checkout_url:
                    type: string
                    format: uri
                  expires_at:
                    type: string
                    format: date-time
                  tariff:
                    type: object
                    additionalProperties: true
        '401':
          description: Invalid product app key or actor assertion.
        '403':
          description: Actor is not a billing manager at the exact scope.
        '409':
          description: Tariff is not Stripe-collected or Checkout/subscription already exists.
        '503':
          description: Stripe billing is disabled or incompletely provisioned.

  /billing/v1/stripe/subscription-summary:
    post:
      tags: [Billing]
      summary: Read a safe product subscription summary
      operationId: getBillingStripeSubscriptionSummary
      description: |
        Requires the exact product's purpose=customer_lifecycle key and actor.
        Returns no Stripe customer, subscription, item, or account identifiers.
        With collection enabled, UOA refreshes current Stripe state first. With
        collection disabled, it returns the last single local account
        projection and sets stripe_collection_enabled=false; it never guesses
        between multiple account projections.
      security:
        - billingAppKey: []
          billingActor: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingSubjectRequest'
      responses:
        '200':
          description: Effective tariff and safe current subscription projection.
          headers:
            Cache-Control:
              schema:
                type: string
                enum: ['private, no-store']
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingStripeSubscriptionSummary'
        '401':
          description: Invalid app key or actor assertion.
        '403':
          description: Key purpose, product, subject, or membership mismatch.
        '409':
          description: More than one disabled account projection could match.

  /billing/v1/stripe/portal-session:
    post:
      tags: [Billing]
      summary: Create an allowlisted Stripe customer portal session
      operationId: createBillingStripePortalSession
      description: |
        Requires the exact product's purpose=customer_lifecycle key, fresh
        actor, an active subscription, and owner/admin authority at its exact
        organisation or team billing scope. The return URL's exact HTTPS origin
        must be registered on that individual app key.
      security:
        - billingAppKey: []
          billingActor: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [product, organisation_id, team_id, user_id, return_url]
              properties:
                product:
                  type: string
                organisation_id:
                  type: string
                team_id:
                  type: string
                user_id:
                  type: string
                return_url:
                  type: string
                  format: uri
      responses:
        '201':
          description: Stripe-hosted portal URL.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [portal_url]
                properties:
                  portal_url:
                    type: string
                    format: uri
        '400':
          description: Return URL is not an exact allowlisted HTTPS origin.
        '401':
          description: Invalid app key or actor assertion.
        '403':
          description: Key purpose, product, subject, membership, or manager mismatch.
        '404':
          description: No active subscription exists at the billing scope.
        '503':
          description: Stripe billing is disabled or incompletely provisioned.

  /billing/v1/cancellation/preview:
    post:
      tags: [Billing]
      summary: Preview exact direct-subscription cancellation impact
      operationId: previewBillingCancellation
      description: |
        Requires the exact product's purpose=customer_lifecycle key, fresh
        actor, and owner/admin authority at the subscription's exact billing
        scope. UOA returns the complete confirmation-dialog model, an opaque
        five-minute token, and a server-generated idempotency key. It offers a
        related-products choice only for same-account subscriptions backed by
        UOA direct-access evidence. Ledger-only indirect use never becomes a
        cancellation choice.
      security:
        - billingAppKey: []
          billingActor: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingSubjectRequest'
      responses:
        '201':
          description: Pinned cancellation preview capability and dialog model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCancellationPreviewV1'
        '401':
          description: Invalid app key or actor assertion.
        '403':
          description: Key purpose, product, subject, membership, or manager mismatch.
        '404':
          description: No active subscription exists at the billing scope.
        '503':
          description: Stripe billing is disabled or incompletely provisioned.

  /billing/v1/cancellation/confirm:
    post:
      tags: [Billing]
      summary: Confirm a pinned cancellation preview
      operationId: confirmBillingCancellation
      description: |
        Locks the opaque preview intent, verifies its single-use binding,
        revalidates exact entitlement and subscription fingerprints, and
        schedules the selected pinned direct subscriptions to cancel at period
        end. The same idempotency key and selection safely resume or replay an
        interrupted/completed confirmation.
      security:
        - billingAppKey: []
          billingActor: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - product
                - organisation_id
                - team_id
                - user_id
                - preview_token
                - idempotency_key
              properties:
                product:
                  type: string
                organisation_id:
                  type: string
                team_id:
                  type: string
                user_id:
                  type: string
                preview_token:
                  type: string
                  pattern: '^uoa_cancel_'
                idempotency_key:
                  type: string
                  pattern: '^uoa_confirm_'
                selection:
                  type: string
                  nullable: true
                  enum:
                    - current_service
                    - current_and_related_direct_services
      responses:
        '200':
          description: Idempotently confirmed cancellation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCancellationConfirmationV1'
        '400':
          description: Required choice is missing or selection is not allowed.
        '403':
          description: Token, actor, product, subject, or manager mismatch.
        '404':
          description: Preview token or current subscription does not exist.
        '409':
          description: Preview state changed or token was reused differently.
        '410':
          description: Preview token expired.
        '503':
          description: Stripe billing is disabled or incompletely provisioned.

  /billing/v1/stripe/webhook:
    post:
      tags: [Billing]
      summary: Reconcile a signed Stripe lifecycle event
      operationId: reconcileBillingStripeWebhook
      description: |
        Verifies `Stripe-Signature` over the exact raw request body with the
        dedicated webhook secret, then retrieves and reconciles current Stripe
        state for the exact account/mode, Checkout, tariff source/assignment,
        scope, and undiscounted item set. Reordered events cannot resurrect
        canceled state. For a draft subscription-cycle invoice.created event,
        UOA requires at least one hour of remaining automatic-finalization
        grace and exports the exact just-ended Ledger month before committing
        the webhook event. Any failure remains retryable. It also records and
        logs invoice.finalization_failed with structured failure status.
        Webhook secrets are never app API keys.
      security:
        - stripeSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Event accepted or idempotently replayed.
          content:
            application/json:
              schema:
                type: object
                required: [received]
                properties:
                  received:
                    type: boolean
                    enum: [true]
        '400':
          description: Missing or invalid signature/body.

  /internal/admin/billing/services:
    get:
      tags: [Billing, Internal Admin]
      summary: List billing control-plane services
      operationId: adminListBillingServices
      description: |
        Lists services with immutable tariff versions, org/team assignments,
        exact organisation/team add-ons and credits, masked purpose-bound app
        keys, Stripe catalog readiness, and test/live subscription projections.
        Plaintext app keys and actor public-key material are never returned.
      security:
        - adminBearer: []
      responses:
        '200':
          description: Billing services and their operator metadata.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401':
          description: Missing or invalid admin token.
        '403':
          description: Caller is not a platform superuser.
    post:
      tags: [Billing, Internal Admin]
      summary: Create a billing service and initial default tariff
      operationId: adminCreateBillingService
      security:
        - adminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [identifier, name, default_tariff]
              properties:
                identifier:
                  type: string
                  pattern: '^[a-z0-9][a-z0-9._-]{0,99}$'
                name:
                  type: string
                  maxLength: 120
                default_tariff:
                  type: object
                  additionalProperties: true
                  description: Immutable tariff terms; the Admin UI defaults to at_cost + none.
      responses:
        '201':
          description: Created service with version-one default tariff.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid service or tariff terms.
        '401':
          description: Missing or invalid admin token.
        '403':
          description: Caller is not a platform superuser.

  /internal/admin/billing/services/{serviceId}/tariffs:
    post:
      tags: [Billing, Internal Admin]
      summary: Append an immutable billing tariff version
      operationId: adminCreateBillingTariffVersion
      security:
        - adminBearer: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [key, name, mode, collection_mode, markup_bps, monthly_subscription]
              properties:
                key:
                  type: string
                name:
                  type: string
                mode:
                  type: string
                  enum: [standard, free, at_cost, custom]
                collection_mode:
                  type: string
                  enum: [stripe, manual, none]
                markup_bps:
                  type: integer
                  minimum: 0
                  maximum: 100000
                monthly_subscription:
                  type: object
                  required: [amount_minor, currency]
                  properties:
                    amount_minor:
                      type: string
                      pattern: '^(0|[1-9]\d*)$'
                    currency:
                      type: string
                      minLength: 3
                      maxLength: 3
                set_as_default:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Created immutable tariff version.
        '400':
          description: Invalid tariff terms.
        '401':
          description: Missing or invalid admin token.
        '403':
          description: Caller is not a platform superuser.

  /internal/admin/billing/services/{serviceId}/default-tariff:
    put:
      tags: [Billing, Internal Admin]
      summary: Move a service's default tariff pointer
      operationId: adminSetDefaultBillingTariff
      security:
        - adminBearer: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [tariff_id]
              properties:
                tariff_id:
                  type: string
      responses:
        '200':
          description: New default tariff.
        '409':
          description: A live Stripe projection pins conflicting tariff terms.

  /internal/admin/billing/services/{serviceId}/assignments:
    put:
      tags: [Billing, Internal Admin]
      summary: Upsert an organisation or team tariff assignment
      operationId: adminUpsertBillingTariffAssignment
      security:
        - adminBearer: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [tariff_id, organisation_id]
              properties:
                tariff_id:
                  type: string
                organisation_id:
                  type: string
                team_id:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Exact immutable assignment.
        '409':
          description: A live Stripe projection pins conflicting tariff terms.

  /internal/admin/billing/services/{serviceId}/assignments/{assignmentId}:
    delete:
      tags: [Billing, Internal Admin]
      summary: Remove a tariff assignment
      operationId: adminRemoveBillingTariffAssignment
      security:
        - adminBearer: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Assignment removed.
        '409':
          description: A live Stripe projection pins the assignment.

  /internal/admin/billing/services/{serviceId}/adjustments:
    post:
      tags: [Billing, Internal Admin]
      summary: Create an exact UOA-owned add-on or credit
      operationId: adminCreateBillingCommercialAdjustment
      security:
        - adminBearer: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - organisation_id
                - key
                - name
                - kind
                - cadence
                - amount_minor
                - currency
                - starts_at
              properties:
                organisation_id:
                  type: string
                team_id:
                  type: string
                  nullable: true
                key:
                  type: string
                  pattern: '^[a-z0-9][a-z0-9._-]{0,99}$'
                name:
                  type: string
                  maxLength: 160
                kind:
                  type: string
                  enum: [add_on, credit]
                cadence:
                  type: string
                  enum: [one_time, monthly]
                amount_minor:
                  type: string
                  pattern: '^(0|[1-9]\d*)$'
                currency:
                  type: string
                  pattern: '^[A-Z]{3}$'
                starts_at:
                  type: string
                  format: date-time
                ends_at:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '201':
          description: Created and audited commercial line.
        '400':
          description: Invalid value, period, product, organisation, or team.

  /internal/admin/billing/services/{serviceId}/adjustments/{adjustmentId}:
    delete:
      tags: [Billing, Internal Admin]
      summary: Deactivate a UOA commercial line
      operationId: adminDeactivateBillingCommercialAdjustment
      security:
        - adminBearer: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
        - name: adjustmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Line deactivated and audit retained.
        '404':
          description: Active commercial line not found.

  /internal/admin/billing/services/{serviceId}/app-keys:
    get:
      tags: [Billing, Internal Admin]
      summary: List masked purpose-bound billing app keys
      operationId: adminListBillingAppKeys
      security:
        - adminBearer: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Masked key metadata including entitlement/customer_lifecycle purpose.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    post:
      tags: [Billing, Internal Admin]
      summary: Mint a purpose-bound billing app key
      operationId: adminCreateBillingAppKey
      description: |
        Returns plaintext exactly once. Entitlement keys forbid return origins
        and can call only effective-tariff. Customer-lifecycle keys require at
        least one exact HTTPS return origin and can call only Checkout,
        subscription summary, portal, and cancellation.
      security:
        - adminBearer: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - purpose
                - name
                - actor_issuer
                - actor_audience
                - actor_public_jwk
                - checkout_return_origins
              properties:
                purpose:
                  type: string
                  enum: [entitlement, customer_lifecycle]
                name:
                  type: string
                  maxLength: 120
                actor_issuer:
                  type: string
                  format: uri
                actor_audience:
                  type: string
                  format: uri
                  description: Exact UOA /billing/v1/effective-tariff URL.
                actor_public_jwk:
                  type: object
                  additionalProperties: true
                  description: Public-only RSA JWK with kid; alg RS256/use sig when present.
                checkout_return_origins:
                  type: array
                  maxItems: 10
                  uniqueItems: true
                  items:
                    type: string
                    format: uri
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '201':
          description: Masked key metadata plus one-time plaintext key.
          headers:
            Cache-Control:
              schema:
                type: string
                enum: ['private, no-store']
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required: [key, purpose]
                properties:
                  key:
                    type: string
                    pattern: '^uoa_app_'
                  purpose:
                    type: string
                    enum: [entitlement, customer_lifecycle]
        '400':
          description: Invalid purpose/origin policy, actor binding, or public JWK.

  /internal/admin/billing/services/{serviceId}/app-keys/{keyId}:
    delete:
      tags: [Billing, Internal Admin]
      summary: Revoke a billing app key immediately
      operationId: adminRevokeBillingAppKey
      security:
        - adminBearer: []
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Key revoked.

  /internal/admin/billing/stripe/usage-exports:
    post:
      tags: [Billing, Internal Admin]
      summary: Reconcile one Ledger subscription month into Stripe usage
      operationId: exportBillingStripeUsage
      description: |
        Platform-superuser reconciliation endpoint. UOA calls Ledger with UOA's
        own dedicated Ledger app key plus a separately signed `metering.read`
        assertion, validates immutable metering-usage-v1 raw provider
        usage/cost and attribution, centrally applies UOA's pinned tariff, and
        emits idempotent customer-money deltas. Ledger supplies no commercial
        fields. Stripe never meters raw tokens, searches, or research units.
      security:
        - adminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [subscription_id, billing_month]
              properties:
                subscription_id:
                  type: string
                billing_month:
                  type: string
                  pattern: '^\d{4}-(0[1-9]|1[0-2])$'
                ledger_snapshot_cursor:
                  type: string
                  pattern: '^mus_[A-Za-z0-9_-]{32}$'
      responses:
        '200':
          description: Immutable cursor and cumulative/delta Stripe meter exports.
          content:
            application/json:
              schema:
                type: object
                required: [ledger_snapshot_cursor, billing_month, exports]
                properties:
                  ledger_snapshot_cursor:
                    type: string
                  billing_month:
                    type: string
                  exports:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          description: Missing or invalid platform-superuser token.
        '409':
          description: Subscription period is not meterable or snapshot is stale.
        '502':
          description: Ledger response does not exactly match the expected contract.
        '503':
          description: Stripe or the dedicated Ledger collector is disabled.

  /org/organisations/{orgId}:
    parameters:
      - $ref: '#/components/parameters/orgIdPath'
