openapi: 3.0.3
info:
  title: UnlikeOtherAuthenticator API
  version: 1.0.0
  description: |
    Centralized OAuth / authentication service. Provides user auth flows,
    token issuance, organisation/team management, and admin operations.

    ## Authentication Schemes

    | Scheme | Header | Format | Used By |
    |--------|--------|--------|---------|
    | Domain Hash Bearer | `Authorization` | `Bearer SHA256(normalizedDomain+clientSecret)` | Domain-scoped server-to-server calls |
    | Admin Bearer | `Authorization` | `Bearer <HS256 JWT>` | Internal admin endpoints |
    | Access Token | `X-UOA-Access-Token` | `Bearer <JWT>` or raw JWT | User-context org endpoints |
    | Config JWT | `X-UOA-Config-JWT` | RS256 JWT | Email send endpoint |

    ## Config URL
    Most endpoints require a `config_url` query parameter pointing to a signed
    RS256 config JWT hosted by the integrator. The server fetches and verifies
    this JWT on every request.

servers:
  - url: https://auth.example.com
    description: Production

security: []

tags:
  - name: Infrastructure
    description: Health, JWKS, API schema, admin UI
  - name: Config
    description: Config JWT validation and verification
  - name: Auth
    description: Authentication flows (login, register, social, tokens)
  - name: 2FA
    description: Two-factor authentication
  - name: i18n
    description: Auth UI translations
  - name: Apps
    description: Mobile/web app startup payload
  - name: Email
    description: Transactional email sending
  - name: Integrations
    description: Integration claim flows
  - name: Domain
    description: Domain-scoped user and log queries
  - name: Organizations
    description: User-facing org, team, group, and membership management
  - name: Internal Admin
    description: System-admin–only management endpoints
  - name: Internal Org
    description: Server-to-server group and team-group management

components:
  securitySchemes:
    domainHashBearer:
      type: http
      scheme: bearer
      description: |
        `Bearer SHA256(normalizedDomain + clientSecret)` — uses the per-domain client secret, not the shared secret.
    adminBearer:
      type: http
      scheme: bearer
      description: |
        HS256 JWT signed with `ADMIN_ACCESS_TOKEN_SECRET`. Claims must include
        `role: "superuser"` and `domain` matching `ADMIN_AUTH_DOMAIN`.
    accessToken:
      type: apiKey
      in: header
      name: X-UOA-Access-Token
      description: |
        UOA access token (HS256 JWT). May be prefixed with `Bearer ` or sent raw.
    configJwt:
      type: apiKey
      in: header
      name: X-UOA-Config-JWT
      description: RS256 config JWT signed with the domain's private key.

  parameters:
    configUrl:
      name: config_url
      in: query
      required: true
      description: HTTPS URL to a signed RS256 config JWT hosted by the integrator.
      schema:
        type: string
        format: uri

    domainQuery:
      name: domain
      in: query
      required: true
      description: Normalised domain (lowercase, trimmed).
      schema:
        type: string
        example: acme.example.com

    limitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200

    cursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: string

    orgIdPath:
      name: orgId
      in: path
      required: true
      schema:
        type: string

    teamIdPath:
      name: teamId
      in: path
      required: true
      schema:
        type: string

    groupIdPath:
      name: groupId
      in: path
      required: true
      schema:
        type: string

    userIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string

    domainPath:
      name: domain
      in: path
      required: true
      description: Normalised domain.
      schema:
        type: string
        example: acme.example.com

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Generic public error message.
        code:
          type: string
          description: Machine-readable error code (only when DEBUG_ENABLED).
        summary:
          type: string
        details:
          type: array
          items:
            type: string
        hints:
          type: array
          items:
            type: string

    OkTrue:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    LoginSuccess:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
          description: One-time authorization code (absent when 2FA required).
        redirect_to:
          type: string
          description: Present when authentication is complete (absent when twofa_required is true).
        twofa_required:
          type: boolean
          description: Present and `true` when 2FA is required before token exchange.
        twofa_token:
          type: string
          description: Short-lived challenge token to submit to `POST /2fa/verify`.
        access_request_status:
          type: string
          enum: [pending]
          description: Set when the user requires approval to access the domain.

    AuthCodeSuccess:
      type: object
      required: [ok, redirect_to]
      properties:
        ok:
          type: boolean
          enum: [true]
        code:
          type: string
        redirect_to:
          type: string
        access_request_status:
          type: string
          enum: [pending]

    TokenResponse:
      type: object
      required: [access_token, expires_in, refresh_token, refresh_token_expires_in, token_type]
      properties:
        access_token:
          type: string
          description: 'HS256 JWT, aud claim is "uoa:access-token".'
        expires_in:
          type: integer
          description: Seconds until access token expiry.
        refresh_token:
          type: string
        refresh_token_expires_in:
          type: integer
          description: Seconds until refresh token expiry.
        token_type:
          type: string
          enum: [Bearer]
        firstLogin:
          type: object
          description: Present only on first-ever login for this user on this domain.
          properties:
            memberships:
              type: object
              properties:
                orgs:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                teams:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
            pending_invites:
              type: array
              items:
                type: object
                additionalProperties: true
            capabilities:
              type: object
              properties:
                can_create_org:
                  type: boolean
                can_accept_invite:
                  type: boolean

    AdminTokenResponse:
      type: object
      required: [access_token, expires_in, token_type]
      additionalProperties: false
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          enum: [Bearer]

    JwksResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            description: Public RSA JWK.
            additionalProperties: true

    PaginatedList:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        next_cursor:
          type: string
          nullable: true

    DomainObject:
      type: object
      additionalProperties: true

    OrganisationObject:
      type: object
      additionalProperties: true

    TeamObject:
      type: object
      additionalProperties: true

    MemberObject:
      type: object
      additionalProperties: true

    GroupObject:
      type: object
      additionalProperties: true

    InviteResult:
      type: string
      enum: [invited, resent_existing, already_member, conflict]

    AccessRequestObject:
      type: object
      additionalProperties: true

    IntegrationRequestObject:
      type: object
      additionalProperties: true

    RotateSecretResponse:
      type: object
      required: [domain, contact_email, delivery_mode, email_dispatched, hash_prefix]
      additionalProperties: false
      properties:
        domain:
          type: string
        contact_email:
          type: string
        delivery_mode:
          type: string
          enum: [email, reveal]
        email_dispatched:
          type: boolean
        hash_prefix:
          type: string
        credentials:
          type: object
          description: Present when `delivery_mode` is `reveal`.
          additionalProperties: false
          required: [domain, client_secret, client_hash, hash_prefix]
          properties:
            domain:
              type: string
            client_secret:
              type: string
            client_hash:
              type: string
            hash_prefix:
              type: string

    ConfigValidateResponse:
      type: object
      properties:
        ok:
          type: boolean
        schema_valid:
          type: boolean
        jwt_signature_valid:
          type: boolean
          nullable: true
        domain_match:
          type: boolean
          nullable: true
        checks:
          type: object
          additionalProperties: true
        issues:
          type: array
          items:
            type: object
            properties:
              stage:
                type: string
              code:
                type: string
              summary:
                type: string
              details:
                type: string
        recommendations:
          type: array
          items:
            type: string

    AppStartupResponse:
      type: object
      required: [flags, cacheTtl, serverTime]
      properties:
        killSwitch:
          type: object
          nullable: true
          additionalProperties: true
        flags:
          type: object
          additionalProperties:
            type: boolean
        cacheTtl:
          type: integer
        serverTime:
          type: string
          format: date-time
        activatesIn:
          type: integer
          description: Seconds until kill-switch activates (when scheduled).

    DomainMappingResponse:
      type: object
      additionalProperties: true
      description: Email-domain-to-org/team mapping result.

    DomainUsersResponse:
      type: object
      required: [ok, users]
      properties:
        ok:
          type: boolean
          enum: [true]
        users:
          type: array
          items:
            type: object
            required: [id, email]
            properties:
              id:
                type: string
              email:
                type: string
              name:
                type: string
                nullable: true
              avatar_url:
                type: string
                nullable: true
              twofa_enabled:
                type: boolean
              role:
                type: string
              created_at:
                type: string
                format: date-time

    DomainLogsResponse:
      type: object
      required: [ok, logs]
      properties:
        ok:
          type: boolean
          enum: [true]
        logs:
          type: array
          items:
            type: object
            required: [id, domain]
            properties:
              id:
                type: string
              user_id:
                type: string
                nullable: true
              email:
                type: string
                nullable: true
              domain:
                type: string
              timestamp:
                type: string
                format: date-time
              auth_method:
                type: string
              ip:
                type: string
                nullable: true
              user_agent:
                type: string
                nullable: true

    DomainDebugResponse:
      type: object
      required: [ok, domain, client_id, superuser]
      properties:
        ok:
          type: boolean
          enum: [true]
        domain:
          type: string
        client_id:
          type: string
        superuser:
          type: object
          required: [user_id, email]
          properties:
            user_id:
              type: string
            email:
              type: string

    AdminSessionResponse:
      type: object
      required: [ok, adminUser]
      additionalProperties: false
      properties:
        ok:
          type: boolean
        adminUser:
          type: object
          additionalProperties: true

    AdminDashboardResponse:
      type: object
      required: [stats, domains, organisations, users, logs, handshakeErrors, bans, apps]
      additionalProperties: false
      properties:
        stats:
          type: object
          additionalProperties: true
        domains:
          type: array
          items:
            type: object
            additionalProperties: true
        organisations:
          type: array
          items:
            type: object
            additionalProperties: true
        users:
          type: array
          items:
            type: object
            additionalProperties: true
        logs:
          type: array
          items:
            type: object
            additionalProperties: true
        handshakeErrors:
          type: array
          items:
            type: object
            additionalProperties: true
        bans:
          type: object
          additionalProperties: true
        apps:
          type: array
          items:
            type: object
            additionalProperties: true

    AdminSettingsResponse:
      type: object
      required: [bans, apps]
      additionalProperties: false
      properties:
        bans:
          type: object
          additionalProperties: true
        apps:
          type: array
          items:
            type: object
            additionalProperties: true

    RegisterDomainResponse:
      type: object
      required: [domain]
      additionalProperties: false
      properties:
        domain:
          type: object
          additionalProperties: true
        client_secret:
          type: string
          description: Only present when a new secret was generated.
        client_hash:
          type: string
        client_hash_prefix:
          type: string

paths:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  /:
    get:
      tags: [Infrastructure]
      summary: Holding page
      operationId: holdingPage
      description: Returns a public HTML page linking to /admin, /llm, and /api.
      responses:
        '200':
          description: HTML holding page.
          content:
            text/html:
              schema:
                type: string

  /health:
    get:
      tags: [Infrastructure]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'

  /.well-known/jwks.json:
    get:
      tags: [Infrastructure]
      summary: Public JWKS
      operationId: getJwks
      description: Returns the public RSA key set used to verify config JWTs.
      responses:
        '200':
          description: JWKS document.
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'

  /api:
    get:
      tags: [Infrastructure]
      summary: Machine-readable API schema
      operationId: getApiSchema
      description: Returns the full endpoint schema as a JSON object.
      responses:
        '200':
          description: Endpoint schema array.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: API info and full endpoint schema.

  /llm:
    get:
      tags: [Infrastructure]
      summary: LLM / human integration guide
      operationId: getLlmGuide
      description: Returns Markdown documentation for LLMs and integrators. Links /api for the JSON schema.
      responses:
        '200':
          description: Markdown integration guide.
          content:
            text/markdown:
              schema:
                type: string

  /admin:
    get:
      tags: [Infrastructure]
      summary: Admin redirect
      operationId: adminRedirect
      description: Redirects to /admin/.
      responses:
        '302':
          description: Redirect to /admin/.

  /admin/{path}:
    get:
      tags: [Infrastructure]
      summary: Admin UI (CSR shell and static assets)
      operationId: getAdminUi
      description: |
        Serves the single-page React admin application. All paths under `/admin/`
        return either the HTML shell or a static asset. `/admin` (no trailing slash)
        redirects to `/admin/`.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HTML shell or static asset.
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Redirect from `/admin` to `/admin/`.

  /admin/assets/{path}:
    get:
      tags: [Infrastructure]
      summary: Admin UI static assets
      operationId: getAdminAsset
      description: Serves built Admin app JS/CSS/font assets. Cached for 1 year (immutable).
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset file with appropriate Content-Type.
        '404':
          description: Asset not found.

  /assets/{path}:
    get:
      tags: [Infrastructure]
      summary: Auth UI static assets
      operationId: getAsset
      description: |
        Serves the built Auth application's JS, CSS, and font assets referenced by
        the auth entrypoint HTML. No authentication required.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Relative asset path (e.g. `index-abc123.js`).
      responses:
        '200':
          description: Asset file with appropriate `Content-Type`.
        '404':
          description: Asset not found.

  # ── Config ────────────────────────────────────────────────────────────────────

  /config/validate:
    post:
      tags: [Config]
      summary: Validate a config JWT
      operationId: validateConfig
      description: |
        Validates a config JWT without making database calls. Runs schema checks,
        signature verification, domain matching, and secret scanning. Rate limited
        to 20 requests per minute per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one of `config`, `config_jwt`, or `config_url` is required.
              properties:
                config:
                  type: object
                  description: Raw decoded config object.
                  additionalProperties: true
                config_jwt:
                  type: string
                  description: Signed RS256 config JWT string.
                config_url:
                  type: string
                  format: uri
                  description: URL from which to fetch the signed config JWT.
      responses:
        '200':
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidateResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /config/verify:
    post:
      tags: [Config]
      summary: Verify a config JWT (debug only)
      operationId: verifyConfig
      description: |
        Like `/config/validate` but skips secret scanning and runtime policy checks.
        Only available when `DEBUG_ENABLED=true` and `NODE_ENV` is not `production`.
        Rate limited to 10 requests per minute per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                  additionalProperties: true
                config_jwt:
                  type: string
                config_url:
                  type: string
                  format: uri
                jwks_url:
                  type: string
                  format: uri
                  description: Defaults to `CONFIG_JWKS_URL` env var.
      responses:
        '200':
          description: Verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidateResponse'
        '404':
          description: Not available (DEBUG_ENABLED not set or production environment).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Auth ──────────────────────────────────────────────────────────────────────

  /auth:
    get:
      tags: [Auth]
      summary: OAuth entrypoint (renders Auth UI)
      operationId: getAuthEntrypoint
      description: |
        Returns the HTML shell for the embedded auth UI. Requires a valid
        `config_url`. Rate limited to 60 requests per minute per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Auth UI HTML.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Email / password login
      operationId: login
      description: |
        Authenticates a user with email and password. Returns an authorization
        code on success, or a `twofa_token` when 2FA is required.
        Rate limited: 10/min per IP, 5/15 min per email.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 1
                remember_me:
                  type: boolean
      responses:
        '200':
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccess'
        '400':
          description: Validation error or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register / initiate email login link
      operationId: register
      description: |
        Sends a magic-link email for registration or passwordless login.
        Always returns 200 to avoid email enumeration.
        Rate limited: 10/min per IP, 5/hour per email.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returned (no enumeration).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: We sent instructions to your email
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Complete email verification
      operationId: verifyEmail
      description: |
        Consumes an email verification token. Optionally sets a password for
        new accounts that haven't set one. Returns an authorization code.
        Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              additionalProperties: false
              properties:
                token:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
                  description: Required when completing a registration that sets a password.
      responses:
        '200':
          description: Email verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCodeSuccess'
        '400':
          description: Missing config, missing password, or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/token:
    post:
      tags: [Auth]
      summary: Token exchange (authorization code or refresh token)
      operationId: exchangeToken
      description: |
        Exchanges an authorization code or refresh token for an access token pair.
        Requires domain hash bearer authentication.
        Rate limited: 10/min per IP.
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Authorization Code Grant
                  type: object
                  required: [code, redirect_url]
                  additionalProperties: false
                  properties:
                    grant_type:
                      type: string
                      enum: [authorization_code]
                      default: authorization_code
                    code:
                      type: string
                      minLength: 1
                    redirect_url:
                      type: string
                      minLength: 1
                    code_verifier:
                      type: string
                      minLength: 1
                      description: PKCE code verifier (required when `code_challenge` was supplied).
                - title: Refresh Token Grant
                  type: object
                  required: [grant_type, refresh_token]
                  additionalProperties: false
                  properties:
                    grant_type:
                      type: string
                      enum: [refresh_token]
                    refresh_token:
                      type: string
                      minLength: 1
      responses:
        '200':
          description: Token pair issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid request or token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/revoke:
    post:
      tags: [Auth]
      summary: Revoke refresh token (logout)
      operationId: revokeToken
      description: |
        Invalidates a refresh token. Requires domain hash bearer authentication.
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              additionalProperties: false
              properties:
                refresh_token:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Token revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'
        '400':
          description: Missing config or invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password/request:
    post:
      tags: [Auth]
      summary: Request password reset email
      operationId: requestPasswordReset
      description: |
        Sends a password reset email. Always returns 200 to avoid enumeration.
        Rate limited: 10/min per IP, 3/hour per email.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "If you have an account with us, we've sent you instructions"
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete password reset
      operationId: resetPassword
      description: |
        Consumes a password-reset token and sets a new password.
        Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              additionalProperties: false
              properties:
                token:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Password reset successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'
        '400':
          description: Invalid token or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/social/{provider}:
    get:
      tags: [Auth]
      summary: Initiate social OAuth flow
      operationId: initiateSocialAuth
      description: |
        Redirects to the social provider's authorization URL. State is stored
        server-side (session cookie). Rate limited: 60/min per IP.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, apple, facebook, github, linkedin]
        - $ref: '#/components/parameters/configUrl'
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: redirect_uri
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to social provider.
        '400':
          description: Missing config or unsupported provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Social provider environment variable missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/callback/{provider}:
    get:
      tags: [Auth]
      summary: Social OAuth callback
      operationId: socialAuthCallback
      description: |
        Handles the OAuth provider redirect. Validates state, exchanges code,
        upserts user, then redirects to the auth UI with a code or `twofa_token`.
        Rate limited: 20/min per IP.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, apple, facebook, github, linkedin]
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
            description: Error code returned by the social provider.
      responses:
        '302':
          description: Redirect to /auth with code or twofa_token, or to error page.
        '400':
          description: Missing callback params or provider mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Social provider returned an error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/domain-mapping:
    get:
      tags: [Auth]
      summary: Email-domain to org/team mapping lookup
      operationId: getDomainMapping
      description: |
        Returns org/team mapping rules for a given email domain. Used by the auth
        UI to auto-suggest or auto-join an org. Requires a valid `config_url`.
        Rate limited: 60/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: email_domain
          in: query
          required: true
          schema:
            type: string
            description: Email domain to look up (e.g. `acme.com`).
      responses:
        '200':
          description: Mapping result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainMappingResponse'
        '401':
          description: Missing config or domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/email/link:
    get:
      tags: [Auth]
      summary: Email magic-link landing page
      operationId: handleEmailLink
      description: |
        Handles click-through from a magic-link email. Validates the token, then
        either redirects (LOGIN_LINK) or renders a set-password form
        (VERIFY_EMAIL_SET_PASSWORD). Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: redirect_url
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
        - name: request_access
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to auth UI with authorization code.
        '200':
          description: HTML set-password form.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing config or invalid token.

  /auth/email/reset-password:
    get:
      tags: [Auth]
      summary: Password-reset email landing page
      operationId: handlePasswordResetEmail
      description: |
        Handles click-through from a password-reset email. Renders the
        set-new-password form. Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: redirect_url
          in: query
          schema:
            type: string
      responses:
        '200':
          description: HTML set-password form.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing config or invalid token.

  /auth/email/twofa-reset:
    get:
      tags: [Auth]
      summary: 2FA-reset email landing page
      operationId: handleTwofaResetEmail
      description: 'Renders the 2FA reset confirmation page. Rate limited: 10/min per IP.'
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HTML confirmation page.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing config or invalid token.

  /auth/email/twofa-reset/confirm:
    post:
      tags: [Auth]
      summary: Confirm 2FA reset via email link
      operationId: confirmTwofaReset
      description: 'Consumes the 2FA reset token. Rate limited: 10/min per IP.'
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 2FA reset confirmed (HTML response).
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Missing config or invalid token.

  /auth/email/team-invite:
    get:
      tags: [Auth]
      summary: Team invite email landing page
      operationId: handleTeamInviteEmail
      description: |
        Shows accept/decline UI for a team invitation. Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: redirect_url
          in: query
          schema:
            type: string
      responses:
        '200':
          description: HTML invite page.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid or expired invite.
          content:
            text/html:
              schema:
                type: string

  /auth/email/team-invite/decline:
    get:
      tags: [Auth]
      summary: Decline team invite via email link
      operationId: declineTeamInvite
      description: 'Marks the team invite as declined. Rate limited: 10/min per IP.'
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: redirect_url
          in: query
          schema:
            type: string
      responses:
        '200':
          description: HTML decline confirmation.
          content:
            text/html:
              schema:
                type: string
        '400':
          description: Invalid or expired invite.

  /auth/email/team-invite-open/{inviteId}.gif:
    get:
      tags: [Auth]
      summary: Email open tracking pixel
      operationId: trackInviteEmailOpen
      description: |
        1×1 GIF tracking pixel. Records that the invite email was opened.
        No authentication required.
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 1×1 transparent GIF.
          content:
            image/gif:
              schema:
                type: string
                format: binary

  # ── 2FA ───────────────────────────────────────────────────────────────────────

  /2fa/verify:
    post:
      tags: [2FA]
      summary: Verify TOTP code
      operationId: verifyTotp
      description: |
        Validates a TOTP code against a pending `twofa_token`. Returns an
        authorization code on success. Rate limited: 5/15 min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [twofa_token, code]
              additionalProperties: false
              properties:
                twofa_token:
                  type: string
                  minLength: 1
                  description: Token returned by `POST /auth/login` when `twofa_required` is true.
                code:
                  type: string
                  minLength: 1
                  description: 6-digit TOTP code from the authenticator app.
      responses:
        '200':
          description: TOTP verified. Authorization code returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCodeSuccess'
        '400':
          description: Missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid TOTP code or challenge mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /2fa/reset/request:
    post:
      tags: [2FA]
      summary: Request 2FA reset email
      operationId: requestTwofaReset
      description: |
        Sends a 2FA reset email. Always returns 200 to avoid enumeration.
        Rate limited: 10/min per IP, 3/hour per email.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Always returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: We sent instructions to your email
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /2fa/reset:
    post:
      tags: [2FA]
      summary: Complete 2FA reset
      operationId: resetTwofa
      description: |
        Consumes a 2FA reset token, disabling 2FA for the user.
        Rate limited: 10/min per IP.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              additionalProperties: false
              properties:
                token:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: 2FA disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'
        '400':
          description: Invalid token or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── i18n ──────────────────────────────────────────────────────────────────────

  /i18n/{language}:
    get:
      tags: [i18n]
      summary: Get Auth UI translations
      operationId: getTranslations
      description: |
        Returns a flat key/value translation map for the requested language.
        The language must appear in the config's `language_config` field.
        Translations are AI-generated and cached permanently.
        Rate limited: 60/min per IP.
      parameters:
        - name: language
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 32
            example: en
        - $ref: '#/components/parameters/configUrl'
      responses:
        '200':
          description: Translation map.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '400':
          description: Language not allowed by config or missing config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Apps ──────────────────────────────────────────────────────────────────────

  /apps/startup:
    get:
      tags: [Apps]
      summary: App startup payload (feature flags + kill switch)
      operationId: getAppStartup
      description: |
        Returns feature flags and kill-switch state for a mobile or web app.
        Requires a valid `config_url`.
      parameters:
        - $ref: '#/components/parameters/configUrl'
        - name: appIdentifier
          in: query
          required: true
          description: Bundle/package identifier (e.g. `com.acme.ios`).
          schema:
            type: string
        - name: platform
          in: query
          required: true
          schema:
            type: string
            enum: [ios, android, web, macos, windows, other]
        - name: versionName
          in: query
          schema:
            type: string
            description: Semantic or display version string.
        - name: versionCode
          in: query
          schema:
            type: string
            description: Android numeric version code.
        - name: buildNumber
          in: query
          schema:
            type: string
            description: iOS / macOS build number.
        - name: userId
          in: query
          schema:
            type: string
            description: Per-user flag overrides and kill-switch targeting.
        - name: teamId
          in: query
          schema:
            type: string
            description: Reserved for multi-team flag resolution.
      responses:
        '200':
          description: Startup payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStartupResponse'
        '400':
          description: Missing or invalid config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Email ─────────────────────────────────────────────────────────────────────

  /email/send:
    post:
      tags: [Email]
      summary: Send a transactional email
      operationId: sendEmail
      description: |
        Sends an email via the domain's configured SES mailing identity.
        Requires a valid RS256 config JWT in the `X-UOA-Config-JWT` header.
        Returns 202 on success (delivery is async).
      security:
        - configJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, text]
              additionalProperties: false
              properties:
                to:
                  type: string
                  format: email
                subject:
                  type: string
                  minLength: 1
                  maxLength: 998
                text:
                  type: string
                  minLength: 1
                  description: Plain-text body.
                html:
                  type: string
                  minLength: 1
                  description: HTML body (optional).
                reply_to:
                  type: string
                  format: email
      responses:
        '202':
          description: Email queued for delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'
        '401':
          description: Missing or invalid config JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Integrations ──────────────────────────────────────────────────────────────

  /integrations/claim/{token}:
    get:
      tags: [Integrations]
      summary: Integration claim confirm page
      operationId: getClaimPage
      description: |
        Shows an HTML confirmation page for a one-time claim token. Does NOT
        consume the token (safe for link scanners). Returns 404 HTML if the token
        is unknown, expired, or already used.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 512
      responses:
        '200':
          description: HTML confirmation page with a POST form.
          content:
            text/html:
              schema:
                type: string
        '404':
          description: Token not found or already consumed (HTML error page).
          content:
            text/html:
              schema:
                type: string

  /integrations/claim/{token}/confirm:
    post:
      tags: [Integrations]
      summary: Consume integration claim token
      operationId: confirmClaim
      description: |
        Consumes the claim token and reveals the integration credentials once.
        Returns an HTML page showing `domain`, `client_secret`, `client_hash`,
        `hash_prefix`, and the LLM URL. Returns 404 HTML on any failure.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 512
      responses:
        '200':
          description: HTML credential reveal page (shown exactly once).
          content:
            text/html:
              schema:
                type: string
        '404':
          description: Token not found, expired, or already consumed (HTML error page).
          content:
            text/html:
              schema:
                type: string

  # ── Domain ────────────────────────────────────────────────────────────────────

  /domain/users:
    get:
      tags: [Domain]
      summary: List domain users
      operationId: getDomainUsers
      description: |
        Returns all users registered under the domain.
        Requires domain hash bearer authentication.
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/limitQuery'
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainUsersResponse'
        '401':
          description: Missing or invalid domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /domain/logs:
    get:
      tags: [Domain]
      summary: List domain login logs
      operationId: getDomainLogs
      description: |
        Returns recent login activity for the domain.
        Requires domain hash bearer authentication.
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/limitQuery'
      responses:
        '200':
          description: Login log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainLogsResponse'
        '401':
          description: Missing or invalid domain hash auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /domain/debug:
    get:
      tags: [Domain]
      summary: Domain debug info (superuser only)
      operationId: getDomainDebug
      description: |
        Returns domain identity and superuser info. Requires both domain hash
        bearer auth AND a superuser access token (`X-UOA-Access-Token`).
      security:
        - domainHashBearer: []
          accessToken: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
      responses:
        '200':
          description: Debug payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainDebugResponse'
        '401':
          description: Missing domain hash auth or access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access token does not have superuser role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Organizations (user-facing) ───────────────────────────────────────────────

  /org/me:
    get:
      tags: [Organizations]
      summary: Current user org context
      operationId: getMyOrgContext
      description: |
        Returns the authenticated user's organisation memberships and capabilities
        within the domain. Requires domain hash auth AND a user access token.
      security:
        - domainHashBearer: []
          accessToken: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/configUrl'
      responses:
        '200':
          description: User org context.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  org:
                    type: object
                    additionalProperties: true
                    description: Present when the user has org context on this domain.
        '401':
          description: Missing access token or config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access token domain mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /org/organisations:
    get:
      tags: [Organizations]
      summary: List organisations
      operationId: listOrgs
      description: |
        Returns organisations visible to the domain. Paginated.
        Requires domain hash bearer auth.
      security:
        - domainHashBearer: []
          accessToken: []
      parameters:
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/configUrl'
        - $ref: '#/components/parameters/limitQuery'
        - $ref: '#/components/parameters/cursorQuery'
      responses:
        '200':
          description: Paginated organisation list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedList'
        '401':
          description: Missing auth.
          content:
            application/json:
