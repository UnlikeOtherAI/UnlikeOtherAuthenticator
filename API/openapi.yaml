  # ── Internal Admin ────────────────────────────────────────────────────────────

  /internal/admin/config:
    get:
      tags: [Internal Admin]
      summary: Serve admin config JWT
      operationId: getAdminConfig
      description: |
        Returns the signed RS256 admin config JWT as `text/plain`. Used by the
        admin login flow. No authentication required; response is not cacheable.
      responses:
        '200':
          description: Signed admin config JWT.
          headers:
            Cache-Control:
              schema:
                type: string
                example: no-store, no-cache
          content:
            text/plain:
              schema:
                type: string

  /internal/admin/token:
    post:
      tags: [Internal Admin]
      summary: Admin token exchange
      operationId: exchangeAdminToken
      description: |
        Exchanges a one-time authorization code (from the admin login flow) for an
        admin access token. The `config_url` domain must match `ADMIN_AUTH_DOMAIN`
        and the user must be a superuser.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, redirect_url]
              additionalProperties: false
              properties:
                code:
                  type: string
                  minLength: 1
                redirect_url:
                  type: string
                  minLength: 1
                code_verifier:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Admin access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTokenResponse'
        '403':
          description: Domain mismatch, not a superuser, or role not granted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server misconfiguration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/admin/session:
    get:
      tags: [Internal Admin]
      summary: Validate admin session
      operationId: getAdminSession
      description: Verifies the admin bearer token and returns the admin user claims.
      security:
        - adminBearer: []
      responses:
        '200':
          description: Valid session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not a superuser or wrong domain.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/admin/dashboard:
    get:
      tags: [Internal Admin]
      summary: Admin dashboard data
      operationId: getAdminDashboard
      description: Returns aggregate stats, recent domains, orgs, users, logs, and handshake errors.
      security:
        - adminBearer: []
      responses:
        '200':
          description: Dashboard payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
        '401':
          description: Missing auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/admin/confidential-delegations:
    get:
      tags: [Internal Admin]
      summary: List confidential delegation mappings
      operationId: adminListConfidentialDelegations
      description: Lists non-secret mapping policy for superuser administration.
      security:
        - adminBearer: []
      responses:
        '200':
          description: DB-backed product mappings; credential material is never returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfidentialDelegationMapping'
        '401':
          description: Missing or invalid admin bearer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin-domain superuser.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Internal Admin]
      summary: Create a confidential delegation mapping
      operationId: adminCreateConfidentialDelegation
      description: |
        Binds an active registered source domain and product to one exact HTTPS
        resource and scope allowlist. The source app authenticates exchanges with
        that domain's own existing rotatable credential.
      security:
        - adminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_domain, product, resource, scopes]
              additionalProperties: false
              properties:
                source_domain:
                  type: string
                  minLength: 1
                  maxLength: 253
                product:
                  type: string
                  pattern: '^[a-z0-9][a-z0-9._-]{0,99}$'
                resource:
                  type: string
                  format: uri
                  description: Exact HTTPS URI; userinfo and fragments are forbidden.
                scopes:
                  type: array
                  minItems: 1
                  maxItems: 3
                  uniqueItems: true
                  items:
                    type: string
                    enum: [ai.invoke, billing.read, token.provision]
                enabled:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Mapping created and audited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfidentialDelegationMapping'
        '400':
          description: Invalid, duplicate, unknown, or disabled source-domain mapping input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid admin bearer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin-domain superuser.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/admin/confidential-delegations/{mappingId}:
    parameters:
      - name: mappingId
        in: path
        required: true
        description: Confidential delegation mapping id.
        schema:
          type: string
    patch:
      tags: [Internal Admin]
      summary: Update a confidential delegation mapping
      operationId: adminUpdateConfidentialDelegation
      description: |
        Updates resource, scope allowlist, or enabled state and audits before/after
        policy. Source domain and product are immutable.
      security:
        - adminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              additionalProperties: false
              properties:
                resource:
                  type: string
                  format: uri
                scopes:
                  type: array
                  minItems: 1
                  maxItems: 3
                  uniqueItems: true
                  items:
                    type: string
                    enum: [ai.invoke, billing.read, token.provision]
                enabled:
                  type: boolean
      responses:
        '200':
          description: Mapping updated and audited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfidentialDelegationMapping'
        '401':
          description: Missing or invalid admin bearer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin-domain superuser.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Mapping not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Internal Admin]
      summary: Delete a confidential delegation mapping
      operationId: adminDeleteConfidentialDelegation
      description: Deletes the exact mapping and appends an audit event.
      security:
        - adminBearer: []
      responses:
        '204':
          description: Mapping deleted.
        '401':
          description: Missing or invalid admin bearer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not an admin-domain superuser.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Mapping not found.
          content:
