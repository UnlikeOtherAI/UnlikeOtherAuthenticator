  # ── Internal Admin ────────────────────────────────────────────────────────────

  /internal/admin/config:
    get:
      tags: [Internal Admin]
      summary: Serve admin config JWT
      operationId: getAdminConfig
      description: |
        Returns the signed RS256 admin config JWT as `text/plain`. Used by the
        admin login flow. No authentication required; response is not cacheable.
      responses:
        '200':
          description: Signed admin config JWT.
          headers:
            Cache-Control:
              schema:
                type: string
                example: no-store, no-cache
          content:
            text/plain:
              schema:
                type: string

  /internal/admin/token:
    post:
      tags: [Internal Admin]
      summary: Admin token exchange
      operationId: exchangeAdminToken
      description: |
        Exchanges a one-time authorization code (from the admin login flow) for an
        admin access token. The `config_url` domain must match `ADMIN_AUTH_DOMAIN`
        and the user must be a superuser.
      parameters:
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, redirect_url]
              additionalProperties: false
              properties:
                code:
                  type: string
                  minLength: 1
                redirect_url:
                  type: string
                  minLength: 1
                code_verifier:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Admin access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTokenResponse'
        '403':
          description: Domain mismatch, not a superuser, or role not granted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server misconfiguration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/admin/session:
    get:
      tags: [Internal Admin]
      summary: Validate admin session
      operationId: getAdminSession
      description: Verifies the admin bearer token and returns the admin user claims.
      security:
        - adminBearer: []
      responses:
        '200':
          description: Valid session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not a superuser or wrong domain.
          content:
