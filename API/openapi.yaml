            application/json:
              schema:
                type: object
                nullable: true
                allOf:
                  - $ref: '#/components/schemas/TeamObject'
        '401':
          description: Missing auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '403':
          description: Not a superuser or wrong admin domain.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
