          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /org/organisations/{orgId}/members:
    parameters:
      - $ref: '#/components/parameters/orgIdPath'
      - $ref: '#/components/parameters/domainQuery'
      - $ref: '#/components/parameters/configUrl'

    get:
      tags: [Organizations]
      summary: List organisation members
      operationId: listOrgMembers
      security:
        - domainHashBearer: []
          accessToken: []
      parameters:
        - $ref: '#/components/parameters/limitQuery'
        - $ref: '#/components/parameters/cursorQuery'
      responses:
        '200':
          description: Paginated member list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedList'
        '401':
          description: Missing auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Organizations]
      summary: Add organisation member
      operationId: addOrgMember
      description: |
        Adds a user (by userId) to the organisation.
        Rate limited: 100/hour per domain+actor.
      security:
        - domainHashBearer: []
          accessToken: []
      requestBody:
        required: true
        content:
