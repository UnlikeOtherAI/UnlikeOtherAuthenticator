  # ── Internal Org (server-to-server) ───────────────────────────────────────────

  /internal/org/organisations/{orgId}/groups:
    post:
      tags: [Internal Org]
      summary: Create group
      operationId: internalCreateGroup
      description: |
        Creates a group within an organisation. Requires domain hash bearer auth
        and `org_features.groups_enabled` in config.
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/orgIdPath'
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              additionalProperties: false
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
                  nullable: true
      responses:
        '200':
          description: Group created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupObject'
        '401':
          description: Missing auth or config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Groups feature not enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/org/organisations/{orgId}/groups/{groupId}:
    parameters:
      - $ref: '#/components/parameters/orgIdPath'
      - $ref: '#/components/parameters/groupIdPath'
      - $ref: '#/components/parameters/domainQuery'
      - $ref: '#/components/parameters/configUrl'

    put:
      tags: [Internal Org]
      summary: Update group
      operationId: internalUpdateGroup
      description: At least one of `name` or `description` must be provided.
      security:
        - domainHashBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
                  nullable: true
      responses:
        '200':
          description: Group updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupObject'
        '400':
          description: No update fields provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing auth or config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Internal Org]
      summary: Delete group
      operationId: internalDeleteGroup
      security:
        - domainHashBearer: []
      responses:
        '200':
          description: Group deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkTrue'
        '401':
          description: Missing auth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/org/organisations/{orgId}/groups/{groupId}/members:
    post:
      tags: [Internal Org]
      summary: Add group member
      operationId: internalAddGroupMember
      security:
        - domainHashBearer: []
      parameters:
        - $ref: '#/components/parameters/orgIdPath'
        - $ref: '#/components/parameters/groupIdPath'
        - $ref: '#/components/parameters/domainQuery'
        - $ref: '#/components/parameters/configUrl'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              additionalProperties: false
              properties:
                userId:
                  type: string
                  minLength: 1
                isAdmin:
                  type: boolean
                  description: Grant admin role within the group.
      responses:
        '200':
          description: Member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberObject'
        '401':
